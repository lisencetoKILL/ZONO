<!DOCTYPE html>
<html lang="en" data-theme="bumblebee">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zono</title>

  <link href="/src/index.css" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      var g = typeof globalThis !== 'undefined' ? globalThis : window;

      function patchTarget(target) {
        if (!target || typeof target !== 'object') return;
        if (typeof target.clearMarks !== 'function') target.clearMarks = function () {};
        if (typeof target.clearMeasures !== 'function') target.clearMeasures = function () {};
        if (typeof target.mark !== 'function') target.mark = function () {};
        if (typeof target.measure !== 'function') target.measure = function () {};
      }

      patchTarget(g.performance);

      var currentMgt = g.mgt;
      patchTarget(currentMgt);

      try {
        Object.defineProperty(g, 'mgt', {
          configurable: true,
          enumerable: true,
          get: function () {
            return currentMgt;
          },
          set: function (value) {
            currentMgt = value;
            patchTarget(currentMgt);
          },
        });
      } catch (e) {
        // Ignore in restricted runtimes.
      }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
